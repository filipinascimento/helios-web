<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Helios Web</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        height: 100dvh;
        width: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        color-scheme: light dark;
        background: #ffffff;
        color: #111827;
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      html[data-helios-theme="dark"], html[data-theme="dark"], html[data-md-color-scheme="dark"],
      body[data-helios-theme="dark"], body[data-theme="dark"], body[data-md-color-scheme="dark"] {
        background: #050505;
        color: #fefefe;
      }
      html[data-helios-theme="light"], html[data-theme="light"], html[data-md-color-scheme="light"],
      body[data-helios-theme="light"], body[data-theme="light"], body[data-md-color-scheme="light"] {
        background: #ffffff;
        color: #111827;
      }
      @media (prefers-color-scheme: dark) {
        html:not([data-helios-theme="light"]):not([data-theme="light"]):not([data-md-color-scheme="light"]),
        html:not([data-helios-theme="light"]):not([data-theme="light"]):not([data-md-color-scheme="light"]) body {
          background: #050505;
          color: #fefefe;
        }
      }
      #app {
        min-height: 100%;
        height: 100dvh;
        width: 100%;
        overscroll-behavior: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/docs/app/main.js"></script>
  </body>
</html>
